name: collect-deals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect deals
        run: node scripts/collect-deals.mjs

      - name: Detect updated deals data
        id: data_changes
        run: |
          if git diff --quiet -- data/deals.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated deals
        if: steps.data_changes.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          git commit -m "chore: update deals data" || exit 0

          # Avoid occasional non-fast-forward failures when another commit lands first.
          if ! git push origin HEAD:main; then
            git fetch origin main

            # Prefer the freshly collected local file when rebasing over concurrent updates.
            if ! git rebase -X ours origin/main; then
              git rebase --abort || true
              echo "Rebase conflict on data/deals.json; skipping this cycle to avoid failing the schedule."
              exit 0
            fi

            git push origin HEAD:main
          fi

      - name: Trigger Vercel deployment hook
        if: steps.data_changes.outputs.updated == 'true'
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not set. Skipping deploy hook trigger."
            exit 0
          fi

          # Trigger a fresh deployment so latest data/deals.json is visible on the site.
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy hook triggered."
