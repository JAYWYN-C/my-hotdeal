name: collect-deals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect deals
        run: node scripts/collect-deals.mjs

      - name: Capture previous deals snapshot
        run: |
          if git cat-file -e HEAD:data/deals.json 2>/dev/null; then
            git show HEAD:data/deals.json > /tmp/previous-deals.json
          else
            printf '{"generatedAt":null,"deals":[]}\n' > /tmp/previous-deals.json
          fi

      - name: Send keyword alerts
        env:
          FIREBASE_PROJECT_ID: ${{ secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_CLIENT_EMAIL: ${{ secrets.FIREBASE_CLIENT_EMAIL }}
          FIREBASE_PRIVATE_KEY: ${{ secrets.FIREBASE_PRIVATE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          ALERT_FROM_EMAIL: ${{ secrets.ALERT_FROM_EMAIL }}
          ALERT_FROM_NAME: 자취핫딜.zip
        run: node scripts/send-keyword-alerts.mjs --previous /tmp/previous-deals.json --current data/deals.json

      - name: Detect updated deals data
        id: data_changes
        run: |
          if git diff --quiet -- data/deals.json; then
            echo "updated=false" >> "$GITHUB_OUTPUT"
          else
            echo "updated=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit updated deals
        if: steps.data_changes.outputs.updated == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/deals.json
          git commit -m "chore: update deals data" || exit 0

          # Avoid occasional non-fast-forward failures when another commit lands first.
          if ! git push origin HEAD:main; then
            git pull --rebase origin main
            git push origin HEAD:main
          fi

      - name: Write Firebase web config for Vercel
        if: steps.data_changes.outputs.updated == 'true'
        run: |
          cat > firebase-config.js <<EOF
          window.FIREBASE_CONFIG = {
            apiKey: "${{ vars.FIREBASE_API_KEY }}",
            authDomain: "${{ vars.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ vars.FIREBASE_PROJECT_ID }}",
            appId: "${{ vars.FIREBASE_APP_ID }}"
          };
          EOF

      - name: Restore Vercel project link
        if: steps.data_changes.outputs.updated == 'true'
        run: |
          mkdir -p .vercel
          cat > .vercel/project.json <<EOF
          {"projectId":"prj_EIypHTz0vQ0q2SPgbrBq0gHWvoga","orgId":"team_syq0wmFzcBPUevK11MtmWKJj","projectName":"jachwi-hotdeal"}
          EOF

      - name: Deploy refreshed site to Vercel
        if: steps.data_changes.outputs.updated == 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_syq0wmFzcBPUevK11MtmWKJj
          VERCEL_PROJECT_ID: prj_EIypHTz0vQ0q2SPgbrBq0gHWvoga
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "VERCEL_TOKEN secret missing; skipping Vercel deploy."
            exit 0
          fi
          npx --yes vercel deploy --prod --yes --token "$VERCEL_TOKEN" --scope 20220363-7579s-projects
