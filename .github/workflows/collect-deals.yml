name: collect-deals

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Collect deals
        run: node scripts/collect-deals.mjs

      - name: Commit updated deals
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update deals data"
          file_pattern: data/deals.json
