name: deploy-pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare artifact
        run: |
          mkdir -p public
          cp -R index.html styles.css app.js data README.md public/

      - name: Write Firebase web config
        run: |
          cat > public/firebase-config.js <<EOF
          window.FIREBASE_CONFIG = {
            apiKey: "${{ vars.FIREBASE_API_KEY }}",
            authDomain: "${{ vars.FIREBASE_AUTH_DOMAIN }}",
            projectId: "${{ vars.FIREBASE_PROJECT_ID }}",
            appId: "${{ vars.FIREBASE_APP_ID }}"
          };
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
